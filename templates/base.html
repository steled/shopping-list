{{define "base"}}
<!DOCTYPE html>
<html lang="de" id="html-root" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einkaufsliste</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>🛒 Einkaufsliste</h1>
    <div class="header-actions">
      <button id="theme-toggle" class="btn-icon" aria-label="Dark/Light Mode wechseln" title="Dark/Light Mode">🌙</button>
      {{if .LoggedIn}}<a href="/logout" class="btn-link">Abmelden</a>{{end}}
    </div>
  </header>
  <main>
    {{template "content" .}}
  </main>
  <footer>
    <span>v{{.Version}}</span>
  </footer>
  <script>
    (function () {
      var html = document.getElementById('html-root');
      var btn  = document.getElementById('theme-toggle');
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored || (prefersDark ? 'dark' : 'light');
      html.dataset.theme = theme;
      if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
      if (btn) btn.addEventListener('click', function () {
        var next = html.dataset.theme === 'dark' ? 'light' : 'dark';
        html.dataset.theme = next;
        localStorage.setItem('theme', next);
        btn.textContent = next === 'dark' ? '☀️' : '🌙';
      });
    })();
  </script>
</body>
</html>
{{end}}
