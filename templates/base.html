{{define "base"}}
<!DOCTYPE html>
<html lang="de" id="html-root" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einkaufsliste</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>🛒 Einkaufsliste</h1>
    <div class="header-actions">
      <button id="theme-toggle" class="btn-icon" aria-label="Dark/Light Mode wechseln" title="Dark/Light Mode">🌙</button>
      {{if .LoggedIn}}<form method="POST" action="/logout" style="display:inline"><button type="submit" class="btn-link">Abmelden</button></form>{{end}}
    </div>
  </header>
  <main>
    {{template "content" .}}
  </main>
  <footer>
    <span>{{.Version}}</span>
  </footer>
  <script src="/static/theme.js"></script>
</body>
</html>
{{end}}
