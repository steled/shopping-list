{{define "content"}}
<form id="add-form" class="add-form">
  <input type="text" id="new-name" placeholder="Neuer Artikel…" required autocomplete="off" aria-label="Artikelname">
  <input type="number" id="new-qty" value="1" min="1" max="999" class="item-qty" aria-label="Anzahl">
  <button type="submit" class="btn btn-primary">＋</button>
</form>

<div class="list-toolbar">
  <button id="filter-btn" class="btn btn-filter" aria-pressed="false" title="Nur markierte Artikel anzeigen">
    <span class="filter-icon">☑</span> Nur zu kaufende
  </button>
</div>

<ul id="items-list">
  {{range .Items}}
  <li class="item{{if .Checked}} checked{{end}}" data-id="{{.ID}}">
    <span class="drag-handle" aria-hidden="true">⠿</span>
    <input type="checkbox" class="item-checkbox" aria-label="Gekauft"{{if .Checked}} checked{{end}}>
    <span class="item-name">{{.Name}}</span>
    <input type="number" class="item-qty" value="{{.Quantity}}" min="1" max="999" aria-label="Anzahl">
    <button class="btn-icon btn-danger" title="Löschen" aria-label="Artikel löschen">🗑</button>
  </li>
  {{else}}
  <li id="empty-hint" class="empty-hint">Keine Artikel – füge deinen ersten hinzu!</li>
  {{end}}
</ul>

<script src="/static/sortable.min.js"></script>
<script src="/static/app.js"></script>
{{end}}
