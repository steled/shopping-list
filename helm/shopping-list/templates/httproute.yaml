{{- if eq .Values.networking.type "gateway" }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "shopping-list.fullname" . }}
  labels:
    {{- include "shopping-list.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- range .Values.networking.gateway.parentRefs }}
    - name: {{ .name | quote }}
      {{- if .namespace }}
      namespace: {{ .namespace | quote }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName | quote }}
      {{- end }}
    {{- end }}
  {{- if .Values.networking.gateway.hostname }}
  hostnames:
    - {{ .Values.networking.gateway.hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "shopping-list.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
