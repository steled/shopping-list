# -- Number of pod replicas
replicaCount: 1

image:
  # -- Image repository
  repository: ghcr.io/steled/shopping-list
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart AppVersion
  tag: ""

# -- Image pull secrets for private registries (e.g. `[{name: my-pull-secret}]`)
imagePullSecrets: []

# -- Partial name override for all resources
nameOverride: ""
# -- Full name override for all resources
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- Name of the service account to use. If not set and create is true, a name is generated using the fullname template
  name: ""

# -- Annotations to add to the pod
podAnnotations: {}
# -- Labels to add to the pod
podLabels: {}

# -- Pod-level security context
podSecurityContext:
  fsGroup: 1001

# -- Container-level security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  # -- Kubernetes service type
  type: ClusterIP
  # -- Service port (should match the application listen port)
  port: 8080

# ── Authentication ────────────────────────────────────────────────────────────
auth:
  # -- Login username
  username: admin
  # -- Login password (plain text; compared with bcrypt hash at runtime). Required when existingSecret is empty.
  password: ""
  # -- HMAC secret used to sign session cookies (minimum 32 random bytes). Required when existingSecret is empty.
  sessionSecret: ""
  # -- Reference an existing Secret instead of creating one. Must contain keys: `username`, `password`, `session-secret`
  existingSecret: ""
  # -- Set to true when the app runs behind a TLS-terminating reverse proxy (Ingress/Gateway).
  # Ensures the session cookie carries the Secure flag even though the pod receives plain HTTP.
  secureCookies: true

# ── Persistence (SQLite) ──────────────────────────────────────────────────────
persistence:
  # -- Enable persistent storage for the SQLite database. When disabled an emptyDir is used and data is lost on restart.
  enabled: true
  # -- Storage class for the PVC. Leave empty to use the cluster default.
  storageClass: ""
  # -- PVC access mode
  accessMode: ReadWriteOnce
  # -- PVC storage size
  size: 1Gi
  # -- Mount path for the data volume inside the container
  mountPath: /data
  # -- Annotations to add to the PVC.
  annotations: {}

# ── Networking ────────────────────────────────────────────────────────────────
networking:
  # -- Networking type: `gateway` creates a Gateway API HTTPRoute, `ingress` creates a classic Kubernetes Ingress
  type: gateway

  gateway:
    # -- Hostname exposed via the HTTPRoute
    hostname: shopping-list.tools.example.lan
    # -- Gateway parentRefs (which Gateway and section to attach to)
    parentRefs:
      - name: api-gateway
        namespace: nginx-gateway
        sectionName: ""

  ingress:
    # -- IngressClass name
    className: ""
    # -- Additional annotations for the Ingress resource.
    # The defaults enforce HTTPS-only access via the nginx ingress controller.
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # -- Hostname exposed via Ingress
    hostname: ""
    # -- TLS configuration for the Ingress
    tls: []
    # tls:
    #   - secretName: shopping-list-tls
    #     hosts:
    #       - shopping.example.com

# ── Resources ─────────────────────────────────────────────────────────────────
# -- CPU/memory resource requests and limits for the application container
resources:
  limits:
    cpu: 100m
    memory: 64Mi
  requests:
    cpu: 20m
    memory: 32Mi

# ── Probes ────────────────────────────────────────────────────────────────────
# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 3

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# -- Node selector for pod scheduling
nodeSelector: {}
# -- Tolerations for pod scheduling
tolerations: []
# -- Affinity rules for pod scheduling
affinity: {}
