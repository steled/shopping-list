name: 🏷️ Auto Release

on:
  push:
    branches:
      - main
    paths:
      - 'main.go'
      - 'internal/**'
      - 'templates/**'
      - 'static/**'
      - 'go.mod'
      - 'go.sum'
      - 'docker/Dockerfile'
      - 'helm/**'

permissions:
  contents: write
  actions: write

jobs:
  auto-release:
    name: Determine version and tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Latest tag: ${LATEST_TAG:-<none>}"

          if [ -n "${LATEST_TAG}" ]; then
            GIT_RANGE="${LATEST_TAG}..HEAD"
          else
            GIT_RANGE="HEAD"
          fi

          COMMITS=$(git log "${GIT_RANGE}" --pretty=format:"%s" -- \
            main.go internal/ templates/ static/ go.mod go.sum docker/Dockerfile helm/)

          if [ -z "$COMMITS" ]; then
            echo "No relevant commits since ${LATEST_TAG} — skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since ${LATEST_TAG}:"
          echo "$COMMITS"

          BUMP="patch"
          while IFS= read -r commit; do
            if echo "$commit" | grep -qE "^[a-z]+(\(.+\))?!:" || echo "$commit" | grep -q "BREAKING CHANGE"; then
              BUMP="major"
              break
            fi
            if echo "$commit" | grep -qE "^feat(\(.+\))?:"; then
              BUMP="minor"
            fi
          done <<< "$COMMITS"

          echo "Bump type: ${BUMP}"

          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          NEW_TAG="v${NEW_VERSION}"
          echo "New tag: ${NEW_TAG}"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.version.outputs.skip == 'false'
        run: |
          git tag "${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Trigger release workflow
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.version.outputs.new_tag }}"
          echo "Triggering release workflow for: ${version}"
          curl -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/workflows/release.yaml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"tag\":\"${version}\"}}"
          echo "✅ Release workflow triggered for ${version}"
