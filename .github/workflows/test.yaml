name: 🧪 Test

on:
  pull_request:
    branches:
      - main
    paths:
      - 'main.go'
      - 'internal/**'
      - 'templates/**'
      - 'static/**'
      - 'go.mod'
      - 'go.sum'
      - 'docker/Dockerfile'
      - 'helm/**'
      - '.github/workflows/test.yaml'
  push:
    branches:
      - main
    paths:
      - 'main.go'
      - 'internal/**'
      - 'templates/**'
      - 'static/**'
      - 'go.mod'
      - 'go.sum'
      - 'docker/Dockerfile'
      - 'helm/**'
      - '.github/workflows/test.yaml'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: docker/Dockerfile
          failure-threshold: warning

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Lint Helm chart (gateway networking)
        run: |
          helm lint helm/shopping-list \
            --set auth.password=test-password \
            --set auth.sessionSecret=test-session-secret-must-be-long-enough \
            --set networking.type=gateway \
            --set networking.gateway.hostname=shopping.example.com \
            --set "networking.gateway.parentRefs[0].name=prod-gateway" \
            --set "networking.gateway.parentRefs[0].namespace=gateway-system"

      - name: Lint Helm chart (ingress networking)
        run: |
          helm lint helm/shopping-list \
            --set auth.password=test-password \
            --set auth.sessionSecret=test-session-secret-must-be-long-enough \
            --set networking.type=ingress \
            --set networking.ingress.hostname=shopping.example.com \
            --set networking.ingress.className=nginx

      - name: Helm template (gateway)
        run: |
          helm template shopping-list helm/shopping-list \
            --set auth.password=test-password \
            --set auth.sessionSecret=test-session-secret-must-be-long-enough \
            --set networking.type=gateway \
            --set networking.gateway.hostname=shopping.example.com \
            --set "networking.gateway.parentRefs[0].name=prod-gateway" \
            --set "networking.gateway.parentRefs[0].namespace=gateway-system"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.txt
